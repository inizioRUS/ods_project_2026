app:
  title: "Basic Modular RAG API"
  version: "0.1.0"
  data_dir: "data/indexes/default"

embedding:
  provider: "e5"
  model_name: "intfloat/multilingual-e5-large-instruct"
  device: "cuda"
  normalize: true
  batch_size: 16
  query_prefix: "query: "
  passage_prefix: "passage: "

chunking:
  chunk_size: 900
  chunk_overlap: 150
  min_chunk_size: 80
  separators: ["\n\n", "\n", ". ", "! ", "? ", "; ", ", ", " "]

retrieval:
  semantic_top_k: 30
  bm25_top_k: 30
  final_top_k: 8
  fusion_method: "rrf"       # rrf | weighted_zscore | weighted_sum
  semantic_weight: 0.55
  bm25_weight: 0.45
  rrf_k: 60

reranker:
  provider: "jina_v2"        # jina_v2 | noop
  model_name: "jinaai/jina-reranker-v2-base-multilingual"
  device: "cuda"
  batch_size: 8
  max_length: 1024
  weight: 1.0

llm:
  provider: "mistral"
  model: "mistral-large-latest"
  temperature: 0.1
  max_tokens: 900
  timeout_seconds: 60

prompts:
  system: |
    Ты — аккуратный RAG-ассистент. Отвечай только на основе предоставленного контекста.
    Если в контексте нет ответа, честно скажи, что данных недостаточно.
    Для каждого важного утверждения добавляй ссылки на источники в формате [C1], [C2].
    Не выдумывай ссылки и не используй источники вне контекста.
  user_template: |
    Вопрос пользователя:
    {query}

    Контекст:
    {context}

    Сформируй точный ответ на русском языке. Используй citation-aware стиль: [C1], [C2].
